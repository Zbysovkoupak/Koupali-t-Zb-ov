<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koupaliště — Správa směn</title>
  <meta name="description" content="Systém plánování směn pro zaměstnance koupaliště">
  <meta name="theme-color" content="#2563eb">
  <!-- PWA manifest (volitelné) -->
  <!-- <link rel="manifest" href="manifest.json"> -->

  <link rel="stylesheet" href="styles.css">

  <!-- SheetJS pro Excel export (CDN, zdarma) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <!-- Supabase JS SDK v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Hlavní kontejner aplikace -->
  <div id="app">
    <!-- Splash screen při načítání -->
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:#6b7280;">
      <div style="font-size:3rem">🏊</div>
      <div style="font-size:1.25rem;font-weight:600;color:#111827">Koupaliště</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:20px;height:20px;border:2px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite"></div>
        <span>Načítám...</span>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>

  <!-- Skripty — pořadí je důležité! -->
  <script src="js/config.js"></script>
  <script src="js/holidays.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/export.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/views-employee.js"></script>
  <script src="js/views-admin.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
