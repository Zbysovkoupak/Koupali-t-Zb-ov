<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Přidat směnu do kalendáře</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f4f8; }
    .box { background: white; border-radius: 16px; padding: 36px 28px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.1); max-width: 360px; width: 90%; }
    .icon { font-size: 3.5rem; }
    h2 { margin: 12px 0 4px; color: #111; }
    p { color: #666; font-size: .95rem; line-height: 1.5; }
    .btn { display: inline-block; margin-top: 16px; padding: 12px 24px; background: #1d4ed8; color: #fff; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: .95rem; }
  </style>
</head>
<body>
<div class="box">
  <div class="icon">📅</div>
  <h2 id="title">Přidávám do kalendáře…</h2>
  <p id="info">Chvíli počkej.</p>
</div>
<script>
(function() {
  var p = new URLSearchParams(window.location.search);
  var start = p.get('start');  // yyyyMMddTHHmmss
  var end   = p.get('end');
  var label = p.get('title') || 'Směna Koupaliště Zbysov';

  if (!start || !end) {
    document.getElementById('title').textContent = 'Chybí parametry';
    document.getElementById('info').textContent = 'Odkaz není platný. Zkontroluj email.';
    return;
  }

  var uid   = 'smena-' + start + '@koupaliste-zbysov';
  var now   = new Date().toISOString().replace(/[-:.]/g,'').substring(0,15) + 'Z';

  var ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Koupaliště Zbysov//Směny//CS',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:' + uid,
    'DTSTAMP:' + now,
    'DTSTART:' + start,
    'DTEND:' + end,
    'SUMMARY:' + label,
    'DESCRIPTION:Směna na Koupališti Zbysov',
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');

  // iOS Safari: přesměrování na data URI otevře přímo Kalendář
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  var isMac = /Macintosh/.test(navigator.userAgent) && navigator.maxTouchPoints > 0;

  if (isIOS || isMac) {
    // Na iOS/iPadOS použijeme data URI — Safari ho otevře přímo v Kalendáři
    window.location.href = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
    document.getElementById('title').textContent = 'Otevírám Kalendář…';
    document.getElementById('info').textContent = 'Pokud se nic nestane, zkus tlačítko níže.';
  } else {
    // Desktop / Android — stažení .ics souboru
    var blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href   = url;
    a.download = 'smena.ics';
    document.body.appendChild(a);
    a.click();
    URL.revokeObjectURL(url);
    document.getElementById('title').textContent = 'Soubor stažen';
    document.getElementById('info').textContent = 'Otevři stažený soubor smena.ics — přidá se do tvého kalendáře.';
  }

  // Záložní tlačítko pro případ že automatika selže
  setTimeout(function() {
    var box = document.querySelector('.box');
    var btn = document.createElement('a');
    btn.className = 'btn';
    btn.textContent = '📅 Přidat do kalendáře';
    btn.href = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(ics);
    btn.download = 'smena.ics';
    box.appendChild(btn);
  }, 1500);
})();
</script>
</body>
</html>
